name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt 5.15 + CMake
        run: |
          brew install qt@5 cmake
          echo "QT5_PATH=/opt/homebrew/opt/qt@5" >> $GITHUB_ENV

      - name: Configure (CMake)
        run: |
          export PATH="${{ env.QT5_PATH }}/bin:$PATH"
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ env.QT5_PATH }}" \
            -DGRAPH_BACKEND=OPENGL

      - name: Build (CMake)
        run: |
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Bundle frameworks (CMake)
        run: |
          if [ -d "build/OpenSoundMeter.app" ]; then
            ${{ env.QT5_PATH }}/bin/macdeployqt build/OpenSoundMeter.app
            mv build/OpenSoundMeter.app .
          fi

      - name: Configure (qmake fallback)
        if: failure()
        run: |
          export PATH="${{ env.QT5_PATH }}/bin:$PATH"
          qmake PREFIX=/usr
          make -j$(sysctl -n hw.ncpu)
          ${{ env.QT5_PATH }}/bin/macdeployqt OpenSoundMeter.app

  macos-legacy:
    if: failure()
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Qt 5.15
        run: |
          brew install qt@5
      - name: Build (qmake legacy)
        run: |
          export PATH="/opt/homebrew/opt/qt@5/bin:$PATH"
          qmake PREFIX=/usr
          make -j$(sysctl -n hw.ncpu)
          /opt/homebrew/opt/qt@5/bin/macdeployqt OpenSoundMeter.app
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenSoundMeter-macOS-legacy
          path: OpenSoundMeter.app/
          if-no-files-found: warn

      - name: Sign app
        if: success()
        run: |
          if [ -n "${{ secrets.APPLE_DEVELOPER_ID }}" ]; then
            codesign --deep --force --verify --verbose \
              --options runtime \
              --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
              OpenSoundMeter.app 2>/dev/null || true
          else
            echo "No signing identity — skipping"
          fi

      - name: Create DMG
        if: success()
        run: |
          brew install create-dmg >/dev/null 2>&1 || true
          if which create-dmg >/dev/null 2>&1; then
            ARCH=$(uname -m)
            create-dmg \
              --volname "OpenSoundMeter" \
              --volicon "icons/white.icns" \
              --window-pos 200 120 \
              --window-size 600 300 \
              --icon-size 100 \
              --icon "OpenSoundMeter.app" 175 120 \
              --app-drop-link 425 120 \
              "OpenSoundMeter-macOS-${ARCH}.dmg" \
              "OpenSoundMeter.app" 2>/dev/null || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenSoundMeter-macOS-${{ runner.arch }}
          path: |
            OpenSoundMeter-macOS-*.dmg
            OpenSoundMeter.app/
          if-no-files-found: warn

  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt 5.15 + CMake
        run: |
          sudo add-apt-repository --yes ppa:beineri/opt-qt-5.15.2-bionic
          sudo apt-get update
          sudo apt-get install build-essential libgl1-mesa-dev cmake
          sudo apt-get install qt515base qt515multimedia qt515quickcontrols2

      - name: Configure (CMake)
        run: |
          source /opt/qt515/bin/qt515-env.sh
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="/opt/qt515" \
            -DGRAPH_BACKEND=OPENGL

      - name: Build (CMake)
        run: |
          cmake --build build -j$(nproc)

      - name: Configure (qmake fallback)
        if: failure()
        run: |
          source /opt/qt515/bin/qt515-env.sh
          qmake PREFIX=/usr
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenSoundMeter-Linux-x86_64
          path: |
            build/OpenSoundMeter
            OpenSoundMeter
          if-no-files-found: warn

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt 5.15
        run: |
          choco install aqtinstall -y
          aqt install-qt windows desktop 5.15.2 win64_msvc2019_64
          echo "C:\Qt\5.15.2\msvc2019_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure (CMake)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (CMake)
        run: |
          cmake --build build --config Release

      - name: Configure (qmake fallback)
        if: failure()
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          qmake PREFIX=C:\OpenSoundMeter
          nmake
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenSoundMeter-Windows-x86_64
          path: |
            build/Release/
            release/
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OpenSoundMeter-macOS-ARM64/**
            OpenSoundMeter-macOS-X64/**
            OpenSoundMeter-Linux-x86_64/**
            OpenSoundMeter-Windows-x86_64/**
          generate_release_notes: true
